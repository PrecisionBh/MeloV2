project_id = "ccrrxdpfepsoghtgtpwx"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

# -----------------------------
# EDGE FUNCTIONS
# -----------------------------

# 🔹 Save / change payment method (Stripe Setup)
[functions.create-payment-setup]
enabled = true
verify_jwt = false
entrypoint = "./functions/create-payment-setup/index.ts"

# 🔹 Quick Buy (charge default saved card)
[functions.create-payment-intent]
enabled = true
verify_jwt = false
entrypoint = "./functions/create-payment-intent/index.ts"

# 🔹 Pay with another card (Stripe Checkout)
[functions.create-checkout-session]
enabled = true
verify_jwt = false
entrypoint = "./functions/create-checkout-session/index.ts"

# 🔹 Stripe Webhook (payment confirmation + shipping capture)
[functions.stripe-webhook]
enabled = true
verify_jwt = false
entrypoint = "./functions/stripe-webhook/index.ts"

[functions.get-shippo-rates]
enabled = true
verify_jwt = true
import_map = "./functions/get-shippo-rates/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/get-shippo-rates/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/get-shippo-rates/*.html" ]

